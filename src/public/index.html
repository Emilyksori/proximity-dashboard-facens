<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESP32 Parking Monitor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="viewport">
      <div class="map-shell" id="mapShell" aria-label="Parking sensor status map">
        <header class="topbar">
          <div class="brand">
            <img class="brand-logo" src="/img/logo-f-a.png" alt="Facens" />
          </div>

          <div class="hero-copy">
            <h1>ESTACIONAMENTO FACENS</h1>
            <p>Mapa de vagas em tempo real</p>
          </div>

          <div class="topbar-status">
            <article class="metric-card metric-card-free">
              <span class="metric-label">Vagas Livres</span>
              <strong class="metric-value" id="freeSpotsValue">0</strong>
            </article>

            <article class="metric-card metric-card-occupied">
              <span class="metric-label">Vagas Ocupadas</span>
              <strong class="metric-value" id="occupiedSpotsValue">0</strong>
            </article>

            <div class="status-chip" id="connectionDot" aria-hidden="true"></div>
          </div>
        </header>

        <div id="mapMount"></div>
      </div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
