<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="asphalt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2F343A"/>
      <stop offset="100%" stop-color="#20242A"/>
    </linearGradient>
    <linearGradient id="solarRoof" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8FA3B8"/>
      <stop offset="100%" stop-color="#556575"/>
    </linearGradient>
    <style>
      .spot-line { stroke: #F5D547; stroke-width: 5; stroke-linecap: round; }
      .sensor { fill: #FFC928; stroke: #1F2937; stroke-width: 4; }
      .pole { stroke: #9CA3AF; stroke-width: 8; stroke-linecap: round; }
      .base { fill: #6B7280; stroke: #D1D5DB; stroke-width: 3; }
      .status { stroke: #FFFFFF; stroke-width: 6; }
      .spot-number { font-family: Arial, sans-serif; font-weight: 700; font-size: 28px; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .car { filter: url(#shadow); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#123524"/>
  <path d="M0 565 C200 500 260 620 430 555 C610 485 740 540 900 480 C1040 430 1110 455 1200 425 L1200 700 L0 700 Z" fill="#1F4D35"/>
  <path d="M0 610 C190 535 280 650 430 585 C610 515 765 570 940 505 C1060 460 1130 495 1200 455" stroke="#C9A227" stroke-width="8" stroke-dasharray="18 16" opacity="0.9"/>

  <!-- Parking area -->
  <g transform="translate(130 135)">
    <rect x="0" y="105" width="935" height="360" rx="28" fill="url(#asphalt)" filter="url(#shadow)"/>

    <!-- Solar roof / canopy -->
    <g transform="translate(35 0)">
      <polygon points="35,0 830,0 890,120 95,120" fill="url(#solarRoof)" stroke="#CBD5E1" stroke-width="4"/>
      <g stroke="#CBD5E1" stroke-width="2" opacity="0.75">
        <line x1="95" y1="20" x2="850" y2="20"/>
        <line x1="105" y1="45" x2="862" y2="45"/>
        <line x1="118" y1="72" x2="875" y2="72"/>
        <line x1="130" y1="100" x2="888" y2="100"/>
        <line x1="180" y1="0" x2="240" y2="120"/>
        <line x1="320" y1="0" x2="380" y2="120"/>
        <line x1="460" y1="0" x2="520" y2="120"/>
        <line x1="600" y1="0" x2="660" y2="120"/>
        <line x1="740" y1="0" x2="800" y2="120"/>
      </g>
    </g>

    <!-- Parking spot markings -->
    <g transform="translate(60 170)">
      <line class="spot-line" x1="0" y1="0" x2="815" y2="0"/>
      <line class="spot-line" x1="0" y1="180" x2="815" y2="180"/>
      <line class="spot-line" x1="0" y1="0" x2="0" y2="180"/>
      <line class="spot-line" x1="136" y1="0" x2="136" y2="180"/>
      <line class="spot-line" x1="272" y1="0" x2="272" y2="180"/>
      <line class="spot-line" x1="408" y1="0" x2="408" y2="180"/>
      <line class="spot-line" x1="544" y1="0" x2="544" y2="180"/>
      <line class="spot-line" x1="680" y1="0" x2="680" y2="180"/>
      <line class="spot-line" x1="815" y1="0" x2="815" y2="180"/>
    </g>

    <!-- Cars: example occupied spots -->
    <g class="car">
      <rect x="230" y="330" width="88" height="150" rx="22" transform="rotate(-90 230 330)" fill="#E5E7EB"/>
      <rect x="392" y="330" width="88" height="150" rx="22" transform="rotate(-90 392 330)" fill="#2563EB"/>
      <rect x="682" y="330" width="88" height="150" rx="22" transform="rotate(-90 682 330)" fill="#DC2626"/>
    </g>

    <!-- Poles and status lights -->
    <g>
      <!-- spot 1 -->
      <line class="pole" x1="127" y1="165" x2="127" y2="70"/>
      <ellipse class="base" cx="127" cy="170" rx="24" ry="10"/>
      <circle id="spot-1-status" class="status" cx="127" cy="55" r="18" fill="#22C55E"/>
      <rect class="sensor" x="101" y="357" width="52" height="34" rx="8"/>
      <circle cx="127" cy="420" r="22" fill="#FFC928" stroke="#111827" stroke-width="4"/>
      <text class="spot-number" x="127" y="420">1</text>

      <!-- spot 2 -->
      <line class="pole" x1="263" y1="165" x2="263" y2="70"/>
      <ellipse class="base" cx="263" cy="170" rx="24" ry="10"/>
      <circle id="spot-2-status" class="status" cx="263" cy="55" r="18" fill="#EF4444"/>
      <rect class="sensor" x="237" y="357" width="52" height="34" rx="8"/>
      <circle cx="263" cy="420" r="22" fill="#FFC928" stroke="#111827" stroke-width="4"/>
      <text class="spot-number" x="263" y="420">2</text>

      <!-- spot 3 -->
      <line class="pole" x1="399" y1="165" x2="399" y2="70"/>
      <ellipse class="base" cx="399" cy="170" rx="24" ry="10"/>
      <circle id="spot-3-status" class="status" cx="399" cy="55" r="18" fill="#22C55E"/>
      <rect class="sensor" x="373" y="357" width="52" height="34" rx="8"/>
      <circle cx="399" cy="420" r="22" fill="#FFC928" stroke="#111827" stroke-width="4"/>
      <text class="spot-number" x="399" y="420">3</text>

      <!-- spot 4 -->
      <line class="pole" x1="535" y1="165" x2="535" y2="70"/>
      <ellipse class="base" cx="535" cy="170" rx="24" ry="10"/>
      <circle id="spot-4-status" class="status" cx="535" cy="55" r="18" fill="#22C55E"/>
      <rect class="sensor" x="509" y="357" width="52" height="34" rx="8"/>
      <circle cx="535" cy="420" r="22" fill="#FFC928" stroke="#111827" stroke-width="4"/>
      <text class="spot-number" x="535" y="420">4</text>

      <!-- spot 5 -->
      <line class="pole" x1="671" y1="165" x2="671" y2="70"/>
      <ellipse class="base" cx="671" cy="170" rx="24" ry="10"/>
      <circle id="spot-5-status" class="status" cx="671" cy="55" r="18" fill="#EF4444"/>
      <rect class="sensor" x="645" y="357" width="52" height="34" rx="8"/>
      <circle cx="671" cy="420" r="22" fill="#FFC928" stroke="#111827" stroke-width="4"/>
      <text class="spot-number" x="671" y="420">5</text>

      <!-- spot 6 -->
      <line class="pole" x1="807" y1="165" x2="807" y2="70"/>
      <ellipse class="base" cx="807" cy="170" rx="24" ry="10"/>
      <circle id="spot-6-status" class="status" cx="807" cy="55" r="18" fill="#22C55E"/>
      <rect class="sensor" x="781" y="357" width="52" height="34" rx="8"/>
      <circle cx="807" cy="420" r="22" fill="#FFC928" stroke="#111827" stroke-width="4"/>
      <text class="spot-number" x="807" y="420">6</text>
    </g>
  </g>
</svg>
